name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Format
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt needed:"; echo "$out"; exit 1; fi
      - name: Vet
        run: go vet ./...
      - name: Test (CGO-free)
        env:
          CGO_ENABLED: '0'
        run: go test ./...

  # The core is CGO-free (spike TDS-4), so a single runner cross-compiles the
  # binary to every target. The tree-sitter fallback provider is CGO and is
  # built separately, per-OS, in its own job once it exists (TDS-11).
  cross-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: go build -o /dev/null .

  ruby-provider:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: providers/ruby
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: providers/ruby
      - name: Test
        run: bundle exec rake test
