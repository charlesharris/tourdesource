<div class="palette" data-palette hidden>
  <div class="palette-backdrop" data-act="palette-close"></div>
  <div class="palette-panel" role="dialog" aria-modal="true" aria-label="Search">
    <div class="palette-input-row">
      <span class="palette-glyph" aria-hidden="true">⌕</span>
      <input class="palette-input" type="text" placeholder="Jump to a file, symbol, or tour stop…" data-palette-input autocomplete="off" spellcheck="false">
      <kbd class="mono">esc</kbd>
    </div>
    <div class="palette-results" data-palette-results></div>
  </div>
</div>
