# Ruby, and the Rails layout on top of it.
#
# Rails extends Ruby and outranks it, so a Rails app matches both at the same
# root and priority decides. A plain gem keeps the Ruby lens.

[lens.ruby]
priority = 10
detect.any = ["Gemfile", "*.gemspec", "Rakefile"]
ignore = ["test/", "spec/", "vendor/", "doc/", "docs/"]

[[lens.ruby.role]]
path = "lib"
column = "domain"
name = "Library"

[[lens.ruby.role]]
path = "exe"
column = "entry"
name = "Executables"

[[lens.ruby.role]]
path = "bin"
column = "entry"
name = "Executables"

# ── Rails ──────────────────────────────────────────────────────────────────
# Roles migrated from the dirRoles table this replaces (TDS-74). lib/ stays in
# the domain column it was moved to in TDS-70: Redmine's lib/redmine holds
# access control, activity streams, field formats and the plugin hook system,
# which is domain logic, not plumbing.

[lens.rails]
extends = "ruby"
priority = 20
detect.all = ["Gemfile", "config/routes.rb"]
ignore = ["db/schema.rb", "db/structure.sql"]

[[lens.rails.role]]
path = "app/controllers"
column = "entry"
name = "Controllers"

[[lens.rails.role]]
path = "app/api"
column = "entry"
name = "API"

[[lens.rails.role]]
path = "config/routes"
